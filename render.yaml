services:
  - type: web
    name: n4xco-shop
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/n4xco.db
    disk:
      name: shop-data
      mountPath: /data
      sizeGB: 1
