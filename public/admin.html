<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N4XCO ADMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root {
  --black: #000;
  --white: #fff;
  --g1: #0d0d0d;
  --g2: #1a1a1a;
  --g3: #2a2a2a;
  --g4: #444;
  --g5: #777;
  --g6: #aaa;
  --green: #00ff88;
  --yellow: #ffee00;
  --red: #ff3333;
  --blue: #00aaff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Space Mono', monospace;
  font-size: 14px;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
  pointer-events:none; z-index:9999;
}
#login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background: var(--black); }
.login-box { border: 1px solid var(--g3); padding: 2.5rem; width:100%; max-width:360px; }
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.1em; }
.login-sub { font-size:0.6rem; color:var(--g5); margin-bottom:1.5rem; }
.btn-login { width:100%; background: var(--white); color: var(--black); border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.15em; padding: 0.85rem; cursor: pointer; }
.login-input { width:100%; background: var(--g1); border: 1px solid var(--g3); padding: 0.75rem 1rem; color: var(--white); font-family: 'Space Mono', monospace; margin-bottom: 1rem; }
#admin-shell { display:none; min-height:100vh; flex-direction:column; }
#admin-shell.visible { display:flex; }
header { height:48px; border-bottom:1px solid var(--g3); display:flex; align-items:center; justify-content:space-between; padding:0 1.5rem; background:var(--black); position:sticky; top:0; z-index:100; }
.admin-layout { display:flex; flex:1; }
.sidebar { width:200px; flex-shrink:0; border-right:1px solid var(--g3); background:var(--g1); padding:1rem 0; height:calc(100vh - 48px); overflow-y:auto; }
.nav-item { display:flex; align-items:center; gap:0.7rem; padding:0.6rem 1.2rem; font-size:0.68rem; color:var(--g5); cursor:pointer; width:100%; background:none; border:none; border-left:2px solid transparent; text-align:left; }
.nav-item:hover { color:var(--white); background:var(--g2); }
.nav-item.active { color:var(--white); background:var(--g2); border-left-color:var(--white); }
.main { flex:1; padding:1.8rem 2rem; overflow-y:auto; }
.panel { display:none; }
.panel.active { display:block; }
.panel-header { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--g3); padding-bottom:1rem; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem; }
.panel-title { font-family:'Bebas Neue', sans-serif; font-size:2rem; letter-spacing:0.08em; }
.btn-primary { background:var(--white); color:var(--black); border:none; font-family:'Bebas Neue', sans-serif; font-size:0.85rem; letter-spacing:0.1em; padding:0.5rem 1.2rem; cursor:pointer; }
.btn-secondary { background:none; color:var(--g6); border:1px solid var(--g3); padding:0.5rem 1rem; cursor:pointer; font-family:'Space Mono', monospace; font-size:0.65rem; }
.btn-danger { background:none; border:1px solid rgba(255,51,51,0.3); color:var(--red); padding:0.25rem 0.6rem; cursor:pointer; font-family:'Space Mono', monospace; font-size:0.6rem; }
.btn-success { background:none; border:1px solid rgba(0,255,136,0.3); color:var(--green); padding:0.25rem 0.6rem; cursor:pointer; font-family:'Space Mono', monospace; font-size:0.6rem; }
.stat-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); border:1px solid var(--g3); margin-bottom:2rem; }
.stat-card { padding:1rem 1.2rem; border-right:1px solid var(--g3); border-bottom:1px solid var(--g3); }
.stat-val { font-family:'Bebas Neue', sans-serif; font-size:2rem; }
.stat-lbl { font-size:0.55rem; color:var(--g5); text-transform:uppercase; letter-spacing:0.1em; }
.field-group { margin-bottom:1rem; }
.field-label { font-size:0.55rem; letter-spacing:0.18em; color:var(--g5); text-transform:uppercase; display:block; margin-bottom:0.3rem; }
.field-input, .field-select, .field-textarea { width:100%; background:var(--g1); border:1px solid var(--g3); padding:0.6rem 1rem; color:var(--white); font-family:'Space Mono', monospace; font-size:0.75rem; }
.field-textarea { min-height:80px; resize:vertical; }
.data-table { width:100%; border-collapse:collapse; }
.data-table th { text-align:left; font-size:0.55rem; color:var(--g5); padding:0.7rem 1rem; border-bottom:1px solid var(--g3); font-weight:normal; }
.data-table td { padding:0.7rem 1rem; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.7rem; }
.badge { font-size:0.55rem; padding:0.2rem 0.55rem; border:1px solid; text-transform:uppercase; display:inline-block; }
.badge-pending { border-color:var(--yellow); color:var(--yellow); }
.badge-approved { border-color:var(--green); color:var(--green); }
.badge-rejected { border-color:var(--red); color:var(--red); }
.badge-fulfilled { border-color:var(--green); color:var(--green); }
.badge-user { border-color:var(--g4); color:var(--g5); }
.badge-admin { border-color:var(--white); color:var(--white); }
.deposit-card, .order-row, .service-row { border:1px solid var(--g3); border-top:none; padding:1rem; display:flex; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; }
.deposit-card:first-child, .order-row:first-child, .service-row:first-child { border-top:1px solid var(--g3); }
.filter-bar { display:flex; gap:0.6rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
.key-list { max-height:300px; overflow-y:auto; border:1px solid var(--g3); }
.key-item { padding:0.4rem 0.8rem; border-bottom:1px solid rgba(255,255,255,0.04); display:flex; justify-content:space-between; align-items:center; }
.plan-row { display:flex; gap:1rem; padding:0.8rem; border:1px solid var(--g3); border-top:none; align-items:center; flex-wrap:wrap; }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:500; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--black); border:1px solid var(--g3); width:100%; max-width:500px; margin:1rem; max-height:90vh; overflow-y:auto; }
.modal-head { border-bottom:1px solid var(--g3); padding:1rem 1.5rem; }
.modal-body2 { padding:1.5rem; }
.m-title { font-family:'Bebas Neue', sans-serif; font-size:1.3rem; letter-spacing:0.1em; }
.m-input { width:100%; background:var(--g1); border:1px solid var(--g3); padding:0.6rem 1rem; color:var(--white); margin-bottom:0.8rem; font-family:'Space Mono', monospace; }
.btn-row { display:flex; gap:0.6rem; margin-top:0.5rem; }
.toast-bar { position:fixed; bottom:1.5rem; right:1.5rem; font-size:0.68rem; padding:0.6rem 1.2rem; opacity:0; transition:opacity 0.2s; pointer-events:none; border:1px solid; z-index:2000; background:var(--black); }
.toast-bar.show { opacity:1; }
.toast-bar.success { border-color:var(--green); color:var(--green); }
.empty-msg { text-align:center; color:var(--g4); padding:3rem; font-size:0.7rem; border:1px solid var(--g3); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">N4XCO</div>
    <div class="login-sub">ADMIN PANEL</div>
    <input type="text" id="adm-user" class="login-input" placeholder="Username">
    <input type="password" id="adm-pass" class="login-input" placeholder="Password">
    <button class="btn-login" id="adm-login-btn">LOGIN</button>
    <div id="adm-err" style="color:var(--red);font-size:0.65rem;margin-top:1rem;display:none;"></div>
  </div>
</div>

<div id="admin-shell">
  <header>
    <div class="header-brand" style="font-family:'Bebas Neue';font-size:1.2rem;">N4XCO ADMIN</div>
    <div style="display:flex;gap:0.5rem;">
      <a href="/" target="_blank" class="btn-secondary" style="font-size:0.6rem;text-decoration:none;">VIEW SHOP</a>
      <button id="logoutBtn" class="btn-danger">LOGOUT</button>
    </div>
  </header>
  <div class="admin-layout">
    <div class="sidebar">
      <div style="font-size:0.5rem;padding:0.5rem 1.2rem;color:var(--g4);">MAIN</div>
      <button class="nav-item active" data-panel="overview"><i class="fas fa-chart-bar"></i> Overview</button>
      <div style="font-size:0.5rem;padding:0.5rem 1.2rem;color:var(--g4);">STORE</div>
      <button class="nav-item" data-panel="apk"><i class="fas fa-mobile-alt"></i> APK Settings</button>
      <button class="nav-item" data-panel="plans"><i class="fas fa-tags"></i> Plans</button>
      <button class="nav-item" data-panel="keys"><i class="fas fa-key"></i> Keys</button>
      <button class="nav-item" data-panel="services"><i class="fas fa-cubes"></i> Services</button>
      <div style="font-size:0.5rem;padding:0.5rem 1.2rem;color:var(--g4);">FINANCE</div>
      <button class="nav-item" data-panel="deposits"><i class="fas fa-money-bill-wave"></i> Deposits</button>
      <div style="font-size:0.5rem;padding:0.5rem 1.2rem;color:var(--g4);">OPERATIONS</div>
      <button class="nav-item" data-panel="orders"><i class="fas fa-receipt"></i> Orders</button>
      <button class="nav-item" data-panel="users"><i class="fas fa-users"></i> Users</button>
      <div style="font-size:0.5rem;padding:0.5rem 1.2rem;color:var(--g4);">SETTINGS</div>
      <button class="nav-item" data-panel="shop-settings"><i class="fas fa-sliders-h"></i> Shop Settings</button>
    </div>

    <div class="main">
      <!-- OVERVIEW -->
      <div class="panel active" id="panel-overview">
        <div class="panel-header"><div class="panel-title">OVERVIEW</div><button class="btn-secondary" onclick="loadStats()">REFRESH</button></div>
        <div class="stat-cards" id="statCards"></div>
        <div style="font-size:0.55rem;letter-spacing:0.15em;color:var(--g5);margin-bottom:0.5rem;">RECENT ORDERS</div>
        <div id="recentOrders"></div>
      </div>

      <!-- APK -->
      <div class="panel" id="panel-apk">
        <div class="panel-header"><div class="panel-title">APK SETTINGS</div></div>
        <div style="max-width:480px;">
          <div class="field-group"><label class="field-label">App Name</label><input type="text" id="apkName" class="field-input"></div>
          <div class="field-group"><label class="field-label">Download Link</label><input type="text" id="apkLink" class="field-input"></div>
          <div class="field-group"><label class="field-label">Logo</label><input type="file" id="logoFile" accept="image/*" class="field-input"><button class="btn-secondary" onclick="uploadLogo()" style="margin-top:0.5rem;">UPLOAD LOGO</button></div>
          <button class="btn-primary" onclick="saveApk()">SAVE APK SETTINGS</button>
        </div>
      </div>

      <!-- PLANS -->
      <div class="panel" id="panel-plans">
        <div class="panel-header"><div class="panel-title">PLANS & PRICES</div><button class="btn-primary" onclick="savePlans()">SAVE PLANS</button></div>
        <div id="plansEditor"></div>
      </div>

      <!-- KEYS -->
      <div class="panel" id="panel-keys">
        <div class="panel-header"><div class="panel-title">KEY MANAGER</div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;">
          <div>
            <div class="field-group"><label class="field-label">Plan</label><select id="keyPlan" class="field-select"></select></div>
            <div class="field-group"><label class="field-label">Keys (one per line)</label><textarea id="keyInput" class="field-textarea" rows="6" placeholder="KEY-XXXX-XXXX&#10;KEY-YYYY-YYYY"></textarea></div>
            <button class="btn-primary" onclick="addKeys()">+ ADD KEYS</button>
          </div>
          <div>
            <select id="viewKeyPlan" class="field-select" onchange="renderKeyPool()"></select>
            <div id="keyPoolStats" style="font-size:0.6rem;margin:0.5rem 0;color:var(--g5);"></div>
            <div id="keyPool" class="key-list"></div>
          </div>
        </div>
      </div>

      <!-- SERVICES -->
      <div class="panel" id="panel-services">
        <div class="panel-header"><div class="panel-title">SERVICES</div><button class="btn-primary" onclick="openAddServiceModal()">+ ADD SERVICE</button></div>
        <div id="servicesList"></div>
      </div>

      <!-- DEPOSITS -->
      <div class="panel" id="panel-deposits">
        <div class="panel-header"><div class="panel-title">DEPOSIT REQUESTS</div><button class="btn-secondary" onclick="loadDeposits()">REFRESH</button></div>
        <div class="filter-bar"><select id="depositFilter" class="field-select" onchange="loadDeposits()" style="width:150px;"><option value="">ALL</option><option value="pending">PENDING</option><option value="approved">APPROVED</option><option value="rejected">REJECTED</option></select></div>
        <div id="depositsList"></div>
      </div>

      <!-- ORDERS -->
      <div class="panel" id="panel-orders">
        <div class="panel-header"><div class="panel-title">ORDERS</div><button class="btn-secondary" onclick="loadOrders()">REFRESH</button></div>
        <div id="ordersList"></div>
      </div>

      <!-- USERS -->
      <div class="panel" id="panel-users">
        <div class="panel-header"><div class="panel-title">USERS</div><button class="btn-primary" onclick="openAddUserModal()">+ ADD USER</button></div>
        <div class="table-wrap"><table class="data-table"><thead><tr><th>USERNAME</th><th>TELEGRAM</th><th>BALANCE</th><th>ROLE</th><th>ACTIONS</th></tr></thead><tbody id="usersTable"></tbody></table></div>
      </div>

      <!-- SHOP SETTINGS -->
      <div class="panel" id="panel-shop-settings">
        <div class="panel-header"><div class="panel-title">SHOP SETTINGS</div></div>
        <div style="max-width:400px;">
          <div class="field-group"><label class="field-label"><input type="checkbox" id="showAndroid"> Show Android Services</label></div>
          <div class="field-group"><label class="field-label"><input type="checkbox" id="showBoosting"> Show Boosting Services</label></div>
          <div class="field-group"><label class="field-label"><input type="checkbox" id="showJepfx"> Show JEPFX Tool</label></div>
          <div class="field-group"><label class="field-label"><input type="checkbox" id="showModule"> Show Module for Rooted</label></div>
          <button class="btn-primary" onclick="saveShopSettings()">SAVE SETTINGS</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SERVICE MODAL -->
<div class="modal-overlay" id="serviceModal"><div class="modal-box"><div class="modal-head"><div class="m-title" id="serviceModalTitle">ADD SERVICE</div></div><div class="modal-body2">
  <input type="hidden" id="editServiceId">
  <label class="field-label">Category</label><select id="serviceCategory" class="field-select"><option value="android">ANDROID</option><option value="boosting">BOOSTING</option><option value="jepfx">JEPFX</option><option value="module">MODULE</option></select>
  <label class="field-label">Title</label><input type="text" id="serviceTitle" class="field-input">
  <label class="field-label">Description</label><textarea id="serviceDesc" class="field-textarea" rows="4"></textarea>
  <label class="field-label">Link (optional)</label><input type="text" id="serviceLink" class="field-input">
  <label class="field-label">Price (optional)</label><input type="number" id="servicePrice" class="field-input" value="0">
  <label class="field-label">Order</label><input type="number" id="serviceOrder" class="field-input" value="0">
  <label class="field-label"><input type="checkbox" id="serviceEnabled" checked> Enabled</label>
  <div class="btn-row"><button class="btn-primary" onclick="saveService()">SAVE</button><button class="btn-secondary" onclick="closeModal('serviceModal')">CANCEL</button></div>
</div></div></div>

<!-- USER MODAL -->
<div class="modal-overlay" id="userModal"><div class="modal-box"><div class="modal-head"><div class="m-title" id="userModalTitle">ADD USER</div></div><div class="modal-body2">
  <input type="hidden" id="editUserId">
  <label class="field-label">Username</label><input type="text" id="newUsername" class="field-input">
  <label class="field-label">Password</label><input type="password" id="newPassword" class="field-input">
  <label class="field-label">Telegram</label><input type="text" id="newTelegram" class="field-input">
  <label class="field-label">Facebook</label><input type="text" id="newFacebook" class="field-input">
  <label class="field-label">Balance</label><input type="number" id="newBalance" class="field-input" value="0">
  <label class="field-label">Role</label><select id="newRole" class="field-select"><option value="user">USER</option><option value="admin">ADMIN</option></select>
  <div class="btn-row"><button class="btn-primary" onclick="saveUser()">SAVE</button><button class="btn-secondary" onclick="closeModal('userModal')">CANCEL</button></div>
</div></div></div>

<div id="toastBar" class="toast-bar"></div>

<script>
let adminData = {};
let allOrders = [], allDeposits = [], allServices = [], allKeys = [];

document.getElementById('adm-login-btn').addEventListener('click', async () => {
  const username = document.getElementById('adm-user').value.trim();
  const password = document.getElementById('adm-pass').value;
  const res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ username, password }) });
  if (res.ok) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('admin-shell').classList.add('visible'); initAdmin(); }
  else { document.getElementById('adm-err').textContent = 'INVALID CREDENTIALS'; document.getElementById('adm-err').style.display = 'block'; }
});

document.getElementById('logoutBtn').addEventListener('click', async () => { await fetch('/api/admin/logout',{method:'POST'}); location.reload(); });

document.querySelectorAll('.nav-item[data-panel]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    if (btn.dataset.panel === 'deposits') loadDeposits();
    if (btn.dataset.panel === 'orders') loadOrders();
    if (btn.dataset.panel === 'users') loadUsers();
    if (btn.dataset.panel === 'services') loadServices();
    if (btn.dataset.panel === 'shop-settings') loadShopSettings();
    if (btn.dataset.panel === 'keys') loadKeys();
  });
});

async function initAdmin() { await loadStats(); loadApk(); loadPlans(); loadKeys(); loadShopSettings(); }

async function loadStats() {
  const res = await fetch('/api/admin/stats'); const stats = await res.json();
  const ordersRes = await fetch('/api/admin/orders'); allOrders = await ordersRes.json();
  document.getElementById('statCards').innerHTML = `
    <div class="stat-card"><div class="stat-val">₱${(stats.revenue||0).toLocaleString()}</div><div class="stat-lbl">REVENUE</div></div>
    <div class="stat-card"><div class="stat-val">${stats.fulfilled||0}</div><div class="stat-lbl">KEYS SOLD</div></div>
    <div class="stat-card"><div class="stat-val">${stats.pendingDeposits||0}</div><div class="stat-lbl">PENDING DEPOSITS</div></div>
    <div class="stat-card"><div class="stat-val">₱${(stats.totalDeposits||0).toLocaleString()}</div><div class="stat-lbl">TOTAL DEPOSITS</div></div>
    <div class="stat-card"><div class="stat-val">${stats.totalUsers||0}</div><div class="stat-lbl">USERS</div></div>
  `;
  const recent = allOrders.slice(0,6);
  document.getElementById('recentOrders').innerHTML = recent.length ? '<div class="table-wrap"><table class="data-table"><thead><tr><th>USER</th><th>PLAN</th><th>PRICE</th><th>STATUS</th></tr></thead><tbody>' + recent.map(o => `<tr><td>${o.username}</td><td>${o.plan_label}</td><td>₱${o.price}</td><td><span class="badge badge-${o.status}">${o.status}</span></td></tr>`).join('') + '</tbody></table></div>' : '<div class="empty-msg">NO ORDERS</div>';
}

async function loadApk() { const res = await fetch('/api/store'); const data = await res.json(); document.getElementById('apkName').value = data.apk?.name || ''; document.getElementById('apkLink').value = data.apk?.link || ''; }
async function saveApk() { await fetch('/api/admin/apk', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name:document.getElementById('apkName').value, link:document.getElementById('apkLink').value }) }); toast('SAVED'); }
async function uploadLogo() { const file = document.getElementById('logoFile').files[0]; if(!file) return; const fd=new FormData(); fd.append('logo',file); await fetch('/api/admin/logo', { method:'POST', body:fd }); toast('LOGO UPLOADED'); }

async function loadPlans() { const res = await fetch('/api/admin/plans'); const plans = await res.json(); adminData.plans = plans; renderPlansEditor(plans); const opts = plans.map(p => `<option value="${p.id}">${p.label}</option>`).join(''); document.getElementById('keyPlan').innerHTML = opts; document.getElementById('viewKeyPlan').innerHTML = opts; }
function renderPlansEditor(plans) { document.getElementById('plansEditor').innerHTML = plans.map(p => `<div class="plan-row"><div style="width:100px;">${p.label}</div><input type="number" id="plan-price-${p.id}" value="${p.price}" style="width:80px;background:var(--g1);border:1px solid var(--g3);padding:0.3rem;color:white;"><input type="number" id="plan-days-${p.id}" value="${p.days}" style="width:70px;background:var(--g1);border:1px solid var(--g3);padding:0.3rem;color:white;"><label style="display:flex;align-items:center;gap:0.3rem;"><input type="checkbox" id="plan-en-${p.id}" ${p.enabled?'checked':''}> Enabled</label></div>`).join(''); }
async function savePlans() { const plans = adminData.plans.map(p => ({ id:p.id, label:p.label, price:parseInt(document.getElementById('plan-price-'+p.id).value), days:parseInt(document.getElementById('plan-days-'+p.id).value), enabled:document.getElementById('plan-en-'+p.id).checked })); await fetch('/api/admin/plans', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ plans }) }); toast('PLANS SAVED'); }

async function loadKeys() { const res = await fetch('/api/admin/keys'); const data = await res.json(); allKeys = data.keys || []; renderKeyPool(); }
function renderKeyPool() { const planId = document.getElementById('viewKeyPlan').value; const planKeys = allKeys.filter(k => k.plan_id === planId); const available = planKeys.filter(k => !k.used).length; document.getElementById('keyPoolStats').textContent = `${available} AVAILABLE · ${planKeys.length} TOTAL`; document.getElementById('keyPool').innerHTML = planKeys.map(k => `<div class="key-item"><span style="color:${k.used?'var(--g4)':'var(--green)'}">${k.key_val}${k.used?' (used)':''}</span>${!k.used?`<button class="btn-danger" onclick="deleteKey(${k.id})">✕</button>`:''}</div>`).join('') || '<div style="padding:1rem;color:var(--g4);">NO KEYS</div>'; }
async function addKeys() { const planId = document.getElementById('keyPlan').value; const keys = document.getElementById('keyInput').value; await fetch('/api/admin/keys', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ planId, keys }) }); document.getElementById('keyInput').value = ''; loadKeys(); toast('KEYS ADDED'); }
async function deleteKey(id) { await fetch('/api/admin/keys/'+id, { method:'DELETE' }); loadKeys(); toast('DELETED'); }

async function loadServices() { const res = await fetch('/api/admin/services'); allServices = await res.json(); renderServices(); }
function renderServices() { const container = document.getElementById('servicesList'); if(!allServices.length){ container.innerHTML='<div class="empty-msg">NO SERVICES</div>'; return; } container.innerHTML = allServices.map(s => `<div class="service-row"><div><div style="font-weight:bold;">${s.category.toUpperCase()} · ${s.title}</div><div style="font-size:0.65rem;color:var(--g5);">${s.description.substring(0,100)}${s.description.length>100?'...':''}</div>${s.price>0?`<div style="font-size:0.6rem;color:var(--green);">₱${s.price}</div>`:''}</div><div><button class="btn-secondary" onclick="editService(${s.id})">EDIT</button><button class="btn-danger" onclick="deleteService(${s.id})">DELETE</button></div></div>`).join(''); }
function openAddServiceModal() { document.getElementById('serviceModalTitle').textContent='ADD SERVICE'; document.getElementById('editServiceId').value=''; document.getElementById('serviceCategory').value='android'; document.getElementById('serviceTitle').value=''; document.getElementById('serviceDesc').value=''; document.getElementById('serviceLink').value=''; document.getElementById('servicePrice').value='0'; document.getElementById('serviceOrder').value='0'; document.getElementById('serviceEnabled').checked=true; document.getElementById('serviceModal').classList.add('open'); }
function editService(id){ const s=allServices.find(x=>x.id==id); document.getElementById('serviceModalTitle').textContent='EDIT SERVICE'; document.getElementById('editServiceId').value=s.id; document.getElementById('serviceCategory').value=s.category; document.getElementById('serviceTitle').value=s.title; document.getElementById('serviceDesc').value=s.description; document.getElementById('serviceLink').value=s.link||''; document.getElementById('servicePrice').value=s.price; document.getElementById('serviceOrder').value=s.order; document.getElementById('serviceEnabled').checked=s.enabled==1; document.getElementById('serviceModal').classList.add('open'); }
async function saveService() { const id=document.getElementById('editServiceId').value; const data={ category:document.getElementById('serviceCategory').value, title:document.getElementById('serviceTitle').value, description:document.getElementById('serviceDesc').value, link:document.getElementById('serviceLink').value, price:parseInt(document.getElementById('servicePrice').value)||0, order:parseInt(document.getElementById('serviceOrder').value)||0, enabled:document.getElementById('serviceEnabled').checked }; const url=id?`/api/admin/services/${id}`:'/api/admin/services'; const method=id?'PUT':'POST'; await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); closeModal('serviceModal'); loadServices(); toast('SAVED'); }
async function deleteService(id){ if(confirm('Delete this service?')){ await fetch(`/api/admin/services/${id}`,{method:'DELETE'}); loadServices(); toast('DELETED'); } }

async function loadDeposits(){ const status=document.getElementById('depositFilter').value||''; const res=await fetch(`/api/admin/deposits${status?'?status='+status:''}`); allDeposits=await res.json(); renderDeposits(); }
function renderDeposits(){ const container=document.getElementById('depositsList'); if(!allDeposits.length){ container.innerHTML='<div class="empty-msg">NO DEPOSITS</div>'; return; } container.innerHTML=allDeposits.map(d=>`<div class="deposit-card"><div><div><strong>${d.username}</strong> · ₱${d.amount}</div><div style="font-size:0.6rem;color:var(--g5);">${new Date(d.created_at).toLocaleString()}</div><div style="font-size:0.55rem;">Ref: ${d.reference_id}</div><div style="font-size:0.6rem;">TG: ${d.telegram} | FB: ${d.facebook} | Last4: ${d.last4_digits}</div>${d.notes?`<div style="font-size:0.6rem;color:var(--g5);">Note: ${d.notes}</div>`:''}</div><div><span class="badge badge-${d.status}">${d.status}</span><div style="margin-top:0.5rem;">${d.status==='pending'?`<button class="btn-success" onclick="approveDeposit(${d.id})">APPROVE</button><button class="btn-danger" onclick="rejectDeposit(${d.id})">REJECT</button>`:''}</div></div></div>`).join(''); }
async function approveDeposit(id){ const notes=prompt('Admin notes (optional):'); await fetch(`/api/admin/deposits/${id}/approve`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({admin_notes:notes||''})}); loadDeposits(); loadStats(); toast('Deposit approved, balance added'); }
async function rejectDeposit(id){ const notes=prompt('Reason for rejection:'); await fetch(`/api/admin/deposits/${id}/reject`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({admin_notes:notes||''})}); loadDeposits(); toast('Deposit rejected'); }

async function loadOrders(){ const res=await fetch('/api/admin/orders'); allOrders=await res.json(); renderOrders(); }
function renderOrders(){ const container=document.getElementById('ordersList'); if(!allOrders.length){ container.innerHTML='<div class="empty-msg">NO ORDERS</div>'; return; } container.innerHTML=allOrders.map(o=>`<div class="order-row"><div><div><strong>${o.username}</strong> · ${o.plan_label} · ₱${o.price}</div><div style="font-size:0.6rem;">${new Date(o.created_at).toLocaleString()}</div><div style="font-size:0.55rem;">Order ID: ${o.id}</div>${o.key_given?`<div style="color:var(--green);font-size:0.65rem;">Key: ${o.key_given}</div>`:''}</div><div><span class="badge badge-${o.status}">${o.status}</span></div></div>`).join(''); }

async function loadUsers(){ const res=await fetch('/api/admin/users'); const users=await res.json(); renderUsers(users); }
function renderUsers(users){ const tb=document.getElementById('usersTable'); tb.innerHTML=users.map(u=>`<tr><td><strong>${u.username}</strong></td><td style="color:var(--blue);">${u.telegram||'-'}</td><td style="color:var(--green);">₱${u.balance||0}</td><td><span class="badge badge-${u.role}">${u.role}</span></td><td><button class="btn-secondary" onclick="editUser(${u.id},'${u.username}','${u.telegram||''}','${u.facebook||''}',${u.balance||0},'${u.role}')">EDIT</button>${u.username!=='N4XCO'?`<button class="btn-danger" onclick="deleteUser(${u.id})">DEL</button>`:''}</td></tr>`).join(''); }
function openAddUserModal(){ document.getElementById('userModalTitle').textContent='ADD USER'; document.getElementById('editUserId').value=''; document.getElementById('newUsername').value=''; document.getElementById('newPassword').value=''; document.getElementById('newTelegram').value=''; document.getElementById('newFacebook').value=''; document.getElementById('newBalance').value='0'; document.getElementById('newRole').value='user'; document.getElementById('userModal').classList.add('open'); }
function editUser(id,username,telegram,facebook,balance,role){ document.getElementById('userModalTitle').textContent='EDIT USER'; document.getElementById('editUserId').value=id; document.getElementById('newUsername').value=username; document.getElementById('newPassword').value=''; document.getElementById('newTelegram').value=telegram; document.getElementById('newFacebook').value=facebook; document.getElementById('newBalance').value=balance; document.getElementById('newRole').value=role; document.getElementById('userModal').classList.add('open'); }
async function saveUser(){ const id=document.getElementById('editUserId').value; const data={ username:document.getElementById('newUsername').value, password:document.getElementById('newPassword').value||undefined, telegram:document.getElementById('newTelegram').value, facebook:document.getElementById('newFacebook').value, balance:parseInt(document.getElementById('newBalance').value)||0, role:document.getElementById('newRole').value }; const url=id?`/api/admin/users/${id}`:'/api/admin/users'; const method=id?'PUT':'POST'; await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); closeModal('userModal'); loadUsers(); toast('SAVED'); }
async function deleteUser(id){ if(confirm('Delete user?')){ await fetch(`/api/admin/users/${id}`,{method:'DELETE'}); loadUsers(); toast('DELETED'); } }

async function loadShopSettings(){ const res=await fetch('/api/admin/data'); const data=await res.json(); const settings=data.shopSettings||{}; document.getElementById('showAndroid').checked=settings.show_android!==0; document.getElementById('showBoosting').checked=settings.show_boosting!==0; document.getElementById('showJepfx').checked=settings.show_jepfx!==0; document.getElementById('showModule').checked=settings.show_module!==0; }
async function saveShopSettings(){ await fetch('/api/admin/shop-settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ show_android:document.getElementById('showAndroid').checked, show_boosting:document.getElementById('showBoosting').checked, show_jepfx:document.getElementById('showJepfx').checked, show_module:document.getElementById('showModule').checked })}); toast('SETTINGS SAVED'); }

function toast(msg){ const el=document.getElementById('toastBar'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

(async () => { const res = await fetch('/api/admin/check'); const data = await res.json(); if(data.admin){ document.getElementById('login-screen').style.display='none'; document.getElementById('admin-shell').classList.add('visible'); initAdmin(); } })();
</script>
</body>
